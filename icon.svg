<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="pinG" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="50%" stop-color="#E8A020"/>
      <stop offset="100%" stop-color="#C47B0A"/>
    </linearGradient>
    <linearGradient id="pinH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE599" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFE599" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="44" fill="#FFF8E6"/>

  <!-- Pin drop shadow -->
  <path d="M100,32 C75,32 54,52 54,76 C54,104 100,168 100,168 C100,168 146,104 146,76 C146,52 125,32 100,32 Z"
        fill="#8B4500" opacity="0.18" transform="translate(3,5)"/>

  <!-- Pin body -->
  <path d="M100,28 C74,28 52,50 52,74 C52,102 100,164 100,164 C100,164 148,102 148,74 C148,50 126,28 100,28 Z"
        fill="url(#pinG)"/>

  <!-- Pin highlight top-left -->
  <path d="M74,44 Q66,62 68,80 Q76,50 100,42 Q86,34 74,44Z"
        fill="url(#pinH)"/>

  <!-- Blue circle (sky/shadow ring) -->
  <circle cx="100" cy="72" r="28" fill="#3A6EA8"/>

  <!-- Sun rays — short lines radiating outward -->
  <g stroke="#FFE082" stroke-width="4" stroke-linecap="round">
    <line x1="100" y1="36" x2="100" y2="26"/>
    <line x1="120" y1="42" x2="126" y2="34"/>
    <line x1="134" y1="60" x2="143" y2="56"/>
    <line x1="137" y1="80" x2="147" y2="82"/>
    <line x1="122" y1="97" x2="129" y2="104"/>
    <line x1="100" y1="103" x2="100" y2="113"/>
    <line x1="78"  y1="97" x2="71"  y2="104"/>
    <line x1="63"  y1="80" x2="53"  y2="82"/>
    <line x1="66"  y1="60" x2="57"  y2="56"/>
    <line x1="80"  y1="42" x2="74"  y2="34"/>
  </g>

  <!-- Sun centre circle -->
  <circle cx="100" cy="72" r="16" fill="#FFE082"/>

  <!-- Sun inner glow -->
  <circle cx="95" cy="67" r="6" fill="white" opacity="0.2"/>
</svg>
